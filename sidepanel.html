<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartWatch</title>
    <link rel="icon" type="image/png" href="smartwatch_extension.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <h1>SmartWatch</h1>
        <div class="topbar-actions">
          <button
            id="settingsToggleBtn"
            class="icon-btn"
            title="Settings"
            aria-label="Open settings"
            type="button"
          >
            <span aria-hidden="true">⚙</span>
          </button>
          <button
            id="closePanelBtn"
            class="icon-btn"
            title="Close"
            aria-label="Close extension"
            type="button"
          >
            <span aria-hidden="true">✕</span>
          </button>
        </div>
      </header>

      <section id="mainView" class="view">
        <div class="stack">
          <div class="label-row">
            <label class="section-label" for="goalsInput">Goal</label>
          </div>
          <textarea
            id="goalsInput"
            class="field-box goal-input"
            rows="3"
            maxlength="300"
            placeholder=""
          ></textarea>
          <button id="analyzeBtn" class="primary-btn">Analyze</button>
          <p id="ctaStatus" class="status-line" aria-live="polite"></p>
        </div>

        <section class="results-section" aria-labelledby="resultsTitle">
          <h2 id="resultsTitle" class="section-heading">Results</h2>
          <div id="analysisOutput" class="output empty-state">
            <p class="empty-title">No results yet.</p>
          </div>
        </section>
      </section>

      <section id="settingsView" class="view hidden" aria-label="Settings">
        <div class="settings-stack">
          <div class="field-group">
            <p class="section-label">AI Model</p>
            <label id="apiKeyLabel" class="field-label" for="apiKey">Gemini API Key</label>
            <input id="apiKey" type="password" placeholder="Paste your API key" />
          </div>

          <button id="saveSettingsBtn" class="primary-btn" type="button">Save settings</button>
          <p id="settingsStatus" class="status-line" aria-live="polite"></p>

          <details class="advanced-panel">
            <summary>Advanced</summary>
            <div class="advanced-content">
              <label class="field-label" for="modelPresetSelect">Model</label>
              <select id="modelPresetSelect" class="select-field">
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="custom">Custom</option>
              </select>
              <div id="customModelGroup" class="custom-model-group hidden">
                <label class="field-label" for="modelInput">Custom model</label>
                <input id="modelInput" type="text" placeholder="gemini-2.5-flash-001" />
              </div>
              <label class="field-label" for="promptTemplateInput">Custom prompt template</label>
              <textarea id="promptTemplateInput" class="field-box prompt-box" rows="8"></textarea>
            </div>
          </details>
        </div>
      </section>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
